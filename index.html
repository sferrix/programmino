<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Patente Caruccia 🏍️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&amp;display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
        }

        .license-card {
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        @keyframes popIn {
            0% { transform: scale(0.6) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .photo-frame {
            animation: hologram 3s infinite alternate ease-in-out;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.6),
                        inset 0 4px 20px rgba(0,0,0,0.2);
        }

        @keyframes hologram {
            from { transform: translateY(-8px) rotate(-2deg); }
            to   { transform: translateY(8px) rotate(2deg); }
        }

        .glow {
            animation: glowPulse 2s infinite alternate;
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 20px #00bfff; }
            to   { text-shadow: 0 0 40px #ff00ff, 0 0 60px #00ffff; }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .sparkle {
            animation: sparkleAnim 1.2s infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.4) rotate(20deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-200 via-pink-100 to-violet-200 min-h-screen py-12 px-4 overflow-x-hidden">
    <div class="max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-10 floating">
            <div class="inline-flex items-center gap-4 bg-white/90 backdrop-blur-md rounded-3xl px-8 py-4 shadow-2xl">
                <span class="text-6xl animate-bounce">🚗</span>
                <div>
                    <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-sky-500 via-pink-500 to-violet-500 tracking-widest glow">
                        PATENTE CARUCCIA
                    </h1>
                    <p class="text-2xl text-pink-500 font-bold -mt-1"> ✨</p>
                </div>
                <span class="text-6xl animate-bounce delay-300">🏍️</span>
            </div>
        </div>

        <!-- Form -->
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 md:p-12 max-w-2xl mx-auto border border-white/50">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-pink-500 font-bold text-lg mb-2">👦 Nome</label>
                    <input id="nome" type="text" placeholder="Mario" 
                           class="w-full bg-gradient-to-r from-sky-50 to-pink-50 border-4 border-transparent focus:border-pink-400 rounded-3xl px-6 py-5 text-2xl font-medium outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-pink-500 font-bold text-lg mb-2">👧 Cognome</label>
                    <input id="cognome" type="text" placeholder="Rossi" 
                           class="w-full bg-gradient-to-r from-sky-50 to-pink-50 border-4 border-transparent focus:border-pink-400 rounded-3xl px-6 py-5 text-2xl font-medium outline-none transition-all duration-300">
                </div>
                <div>
                    <label class="block text-pink-500 font-bold text-lg mb-2">🎂 Età</label>
                    <input id="eta" type="number" min="0" max="120" placeholder="18" 
                           class="w-full bg-gradient-to-r from-sky-50 to-pink-50 border-4 border-transparent focus:border-pink-400 rounded-3xl px-6 py-5 text-2xl font-medium outline-none transition-all duration-300">
                </div>
            </div>

            <button onclick="generaPatente()" 
                    class="mt-10 w-full bg-gradient-to-r from-pink-400 via-purple-400 to-sky-400 hover:from-pink-500 hover:via-purple-500 hover:to-sky-500 text-white text-3xl font-bold py-7 rounded-3xl shadow-xl flex items-center justify-center gap-4 transition-all active:scale-95 relative overflow-hidden group">
                <span class="relative z-10">GENERA LA MIA PATENTE! ✨</span>
                <span class="text-4xl group-active:rotate-12 transition-transform">🚀</span>
            </button>
        </div>

        <!-- Risultato -->
        <div id="risultato" class="hidden mt-12"></div>

        <div class="text-center mt-16 text-sky-500/60 text-sm">
            Creato con ❤️ e tante animazioni da Grok
        </div>
    </div>

    <script>
        function launchConfetti() {
            confetti({
                particleCount: 200,
                spread: 70,
                origin: { y: 0.6 }
            });
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0.1 }
                });
            }, 300);
        }

        function generaPatente() {
            const nome = document.getElementById('nome').value.trim();
            const cognome = document.getElementById('cognome').value.trim();
            const eta = parseInt(document.getElementById('eta').value);

            if (!nome || !cognome || isNaN(eta) || eta < 0) {
                alert("🫣 Per favore compila tutti i campi!");
                return;
            }

            const risultato = document.getElementById('risultato');
            risultato.classList.remove('hidden');
            risultato.scrollIntoView({ behavior: "smooth" });

            let html = '';

            if (eta >= 18) {
                // Patente B - Auto
                html = `
                <div class="license-card mx-auto max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border-[16px] border-sky-400 relative">
                    <div class="absolute -top-4 -right-4 bg-yellow-300 text-yellow-800 text-xs font-bold px-6 py-2 rounded-2xl rotate-12 shadow-xl z-10">
                        SUPER COOL
                    </div>
                    
                    <div class="bg-gradient-to-r from-sky-600 to-blue-700 px-10 py-8 text-white flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-3">
                                <span class="text-5xl">🇮🇹</span>
                                <div>
                                    <h2 class="text-5xl font-black tracking-wider">PATENTE</h2>
                                    <p class="text-2xl -mt-2">DI GUIDA</p>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="text-8xl font-black leading-none text-white/90">B</div>
                            <p class="uppercase text-lg tracking-[3px]">Automobili</p>
                        </div>
                        <div class="text-6xl">🚗💨</div>
                    </div>

                    <div class="flex p-10 gap-10">
                        <div class="photo-frame w-60 h-72 rounded-3xl flex-shrink-0 flex flex-col items-center justify-center bg-gradient-to-br from-white to-sky-50 border-8 border-white relative overflow-hidden">
                            <div class="text-9xl mb-6 floating">🚗</div>
                            <div class="absolute bottom-4 text-xs bg-white/80 px-6 py-2 rounded-2xl font-bold text-sky-600 shadow-inner">FOTO UFFICIALE</div>
                        </div>

                        <div class="flex-1 space-y-8 pt-4">
                            <div class="border-b-4 border-dashed border-sky-200 pb-4">
                                <span class="block text-sky-500 text-sm font-bold">COGNOME</span>
                                <span class="text-4xl font-bold">${cognome.toUpperCase()}</span>
                            </div>
                            <div class="border-b-4 border-dashed border-sky-200 pb-4">
                                <span class="block text-sky-500 text-sm font-bold">NOME</span>
                                <span class="text-4xl font-bold">${nome.toUpperCase()}</span>
                            </div>
                            <div>
                                <span class="block text-sky-500 text-sm font-bold">ETÀ</span>
                                <span class="text-4xl font-bold">${eta} anni</span>
                            </div>
                            
                            <div class="flex justify-between items-end pt-6">
                                <div>
                                    <span class="text-xs uppercase tracking-widest">Categoria</span>
                                    <span class="block text-7xl font-black text-sky-500">B</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs uppercase">Valida fino</span>
                                    <span class="block text-4xl font-bold text-pink-500">31.12.2035</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-r from-sky-400 to-blue-500 text-white text-center py-5 font-bold text-lg tracking-widest flex items-center justify-center gap-3">
                        <span class="text-2xl">🌟</span> PATENTE TIPO B - PILOTA UFFICIALE 🌟
                    </div>
                </div>`;
            } 
            else if (eta >= 16) {
                // Patente A - Moto
                html = `
                <div class="license-card mx-auto max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border-[16px] border-purple-500 relative">
                    <div class="absolute -top-4 -left-4 bg-orange-400 text-white text-xs font-bold px-6 py-2 rounded-2xl -rotate-12 shadow-xl z-10">
                        VELOCE!
                    </div>
                    
                    <div class="bg-gradient-to-r from-purple-600 to-violet-700 px-10 py-8 text-white flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-5xl">🇮🇹</span>
                            <div>
                                <h2 class="text-5xl font-black tracking-wider">PATENTE</h2>
                                <p class="text-2xl -mt-2">DI GUIDA</p>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="text-8xl font-black leading-none">A</div>
                            <p class="uppercase text-lg tracking-[3px]">Motocicli</p>
                        </div>
                        <div class="text-6xl">🏍️🔥</div>
                    </div>

                    <div class="flex p-10 gap-10">
                        <div class="photo-frame w-60 h-72 rounded-3xl flex-shrink-0 flex flex-col items-center justify-center bg-gradient-to-br from-white to-purple-50 border-8 border-white relative overflow-hidden">
                            <div class="text-9xl mb-6 floating">🏍️</div>
                            <div class="absolute bottom-4 text-xs bg-white/80 px-6 py-2 rounded-2xl font-bold text-purple-600 shadow-inner">FOTO UFFICIALE</div>
                        </div>

                        <div class="flex-1 space-y-8 pt-4">
                            <div class="border-b-4 border-dashed border-purple-200 pb-4">
                                <span class="block text-purple-500 text-sm font-bold">COGNOME</span>
                                <span class="text-4xl font-bold">${cognome.toUpperCase()}</span>
                            </div>
                            <div class="border-b-4 border-dashed border-purple-200 pb-4">
                                <span class="block text-purple-500 text-sm font-bold">NOME</span>
                                <span class="text-4xl font-bold">${nome.toUpperCase()}</span>
                            </div>
                            <div>
                                <span class="block text-purple-500 text-sm font-bold">ETÀ</span>
                                <span class="text-4xl font-bold">${eta} anni</span>
                            </div>
                            
                            <div class="flex justify-between items-end pt-6">
                                <div>
                                    <span class="text-xs uppercase tracking-widest">Categoria</span>
                                    <span class="block text-7xl font-black text-purple-500">A</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs uppercase">Valida fino</span>
                                    <span class="block text-4xl font-bold text-pink-500">31.12.2035</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-r from-purple-400 to-violet-500 text-white text-center py-5 font-bold text-lg tracking-widest flex items-center justify-center gap-3">
                        <span class="text-2xl">🏍️</span> PATENTE TIPO A - MOTARD LEGGENDARIO <span class="text-2xl">🏍️</span>
                    </div>
                </div>`;
            } 
            else {
                html = `
                <div class="mx-auto max-w-lg bg-gradient-to-br from-pink-100 to-yellow-100 rounded-3xl p-16 text-center shadow-2xl">
                    <div class="text-9xl mb-8 animate-bounce">🐣</div>
                    <h2 class="text-6xl font-bold text-pink-600 mb-4">Ancora troppo piccolo!</h2>
                    <p class="text-3xl text-pink-500">Hai solo <span class="font-black">${eta}</span> anni...</p>
                    <p class="mt-10 text-2xl text-pink-600">Torna quando sarai più grande, campione! 💕</p>
                    <button onclick="document.getElementById('risultato').classList.add('hidden')" 
                            class="mt-12 px-12 py-5 bg-white text-pink-500 font-bold text-2xl rounded-3xl shadow-lg hover:scale-110 transition-transform">
                        🔄 Prova di nuovo
                    </button>
                </div>`;
            }

            risultato.innerHTML = html;

            // Lancio confetti solo per chi è maggiorenne o ha 16+ anni
            if (eta >= 16) {
                setTimeout(launchConfetti, 600);
            }
        }

        // Enter key support
        document.getElementById('eta').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generaPatente();
        });
    </script>
</body>
</html>
